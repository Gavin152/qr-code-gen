<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <script>
    try {
      var t = localStorage.getItem('theme-preference');
      if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀</button>
    <h1>QR Code Generator</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="url">URL</button>
      <button class="tab" data-tab="wifi">WiFi</button>
    </div>

    <!-- URL Panel -->
    <div class="panel active" id="panel-url">
      <div class="field">
        <label>URL</label>
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
      </div>
    </div>

    <!-- WiFi Panel -->
    <div class="panel" id="panel-wifi">
      <div class="field">
        <label>Network Name (SSID)</label>
        <input type="text" id="wifi-ssid" placeholder="MyNetwork">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="wifi-password" placeholder="••••••••">
      </div>
      <div class="field">
        <label>Security</label>
        <select id="wifi-security">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="">None</option>
        </select>
      </div>
    </div>

    <!-- Styling -->
    <div class="section-title">Style</div>

    <div class="row">
      <div class="field">
        <label>Dot Shape</label>
        <select id="dot-style">
          <option value="square">Square</option>
          <option value="rounded">Rounded</option>
          <option value="extra-rounded" selected>Extra Rounded</option>
          <option value="classy">Classy</option>
          <option value="classy-rounded">Classy Rounded</option>
        </select>
      </div>
      <div class="field">
        <label>Corner Shape</label>
        <select id="corner-style">
          <option value="square">Square</option>
          <option value="extra-rounded" selected>Rounded</option>
          <option value="dot">Dot</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Foreground</label>
        <div class="color-field">
          <input type="color" id="fg-color" value="#000000">
          <span class="color-hex" id="fg-hex">#000000</span>
        </div>
      </div>
      <div class="field">
        <label>Background</label>
        <div class="color-field">
          <input type="color" id="bg-color" value="#ffffff">
          <span class="color-hex" id="bg-hex">#ffffff</span>
        </div>
      </div>
    </div>

    <div class="field" style="margin-top:1rem">
      <label>Logo</label>
      <div class="logo-row">
        <button class="logo-btn" onclick="document.getElementById('logo-input').click()">Choose image</button>
        <input type="file" id="logo-input" accept="image/*">
        <span class="logo-name" id="logo-name"></span>
        <button class="logo-clear" id="logo-clear" style="display:none" onclick="clearLogo()">remove</button>
      </div>
    </div>
    <div class="field" id="logo-size-field" style="display:none">
      <label>Logo Size — <span id="logo-size-val">30%</span></label>
      <input type="range" id="logo-size" min="10" max="60" value="30" style="width:100%;cursor:pointer">
    </div>

    <!-- Preview -->
    <div class="preview">
      <div id="qr-canvas"></div>
    </div>

    <!-- Download -->
    <div class="download-row">
      <button class="fmt-btn active" id="fmt-png" onclick="setFormat('png')">PNG</button>
      <button class="fmt-btn" id="fmt-svg" onclick="setFormat('svg')">SVG</button>
      <button class="download-btn" onclick="downloadQR()">Download</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
