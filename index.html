<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 0.5rem 1.25rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }

    .tab.active {
      color: #111;
      border-bottom-color: #111;
      font-weight: 500;
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Form */
    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #888;
    }

    /* Styling section */
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      margin: 1.5rem 0 1rem;
    }

    .row {
      display: flex;
      gap: 1rem;
    }

    .row .field { flex: 1; }

    /* Color pickers */
    .color-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type="color"] {
      width: 2.2rem;
      height: 2.2rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 2px;
      cursor: pointer;
      background: #fff;
    }

    .color-hex {
      font-size: 0.88rem;
      color: #555;
      font-family: monospace;
    }

    /* Logo upload */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 0.88rem;
      cursor: pointer;
      color: #444;
      transition: border-color 0.15s;
      white-space: nowrap;
    }

    .logo-btn:hover { border-color: #888; }

    #logo-input { display: none; }

    .logo-clear {
      font-size: 0.82rem;
      color: #999;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }

    .logo-name {
      font-size: 0.82rem;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }

    /* Preview */
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 2rem 0 1.5rem;
    }

    #qr-canvas {
      border-radius: 8px;
      overflow: hidden;
    }

    /* Download */
    .download-row {
      display: flex;
      gap: 0.5rem;
    }

    .fmt-btn {
      padding: 0.75rem 1rem;
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .fmt-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .download-btn {
      flex: 1;
      padding: 0.75rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .download-btn:hover { background: #333; }
  </style>
</head>
<body>
  <div class="app">
    <h1>QR Code Generator</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="url">URL</button>
      <button class="tab" data-tab="wifi">WiFi</button>
    </div>

    <!-- URL Panel -->
    <div class="panel active" id="panel-url">
      <div class="field">
        <label>URL</label>
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
      </div>
    </div>

    <!-- WiFi Panel -->
    <div class="panel" id="panel-wifi">
      <div class="field">
        <label>Network Name (SSID)</label>
        <input type="text" id="wifi-ssid" placeholder="MyNetwork">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="wifi-password" placeholder="••••••••">
      </div>
      <div class="field">
        <label>Security</label>
        <select id="wifi-security">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="">None</option>
        </select>
      </div>
    </div>

    <!-- Styling -->
    <div class="section-title">Style</div>

    <div class="row">
      <div class="field">
        <label>Dot Shape</label>
        <select id="dot-style">
          <option value="square">Square</option>
          <option value="rounded">Rounded</option>
          <option value="extra-rounded" selected>Extra Rounded</option>
          <option value="classy">Classy</option>
          <option value="classy-rounded">Classy Rounded</option>
        </select>
      </div>
      <div class="field">
        <label>Corner Shape</label>
        <select id="corner-style">
          <option value="square">Square</option>
          <option value="extra-rounded" selected>Rounded</option>
          <option value="dot">Dot</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Foreground</label>
        <div class="color-field">
          <input type="color" id="fg-color" value="#000000">
          <span class="color-hex" id="fg-hex">#000000</span>
        </div>
      </div>
      <div class="field">
        <label>Background</label>
        <div class="color-field">
          <input type="color" id="bg-color" value="#ffffff">
          <span class="color-hex" id="bg-hex">#ffffff</span>
        </div>
      </div>
    </div>

    <div class="field" style="margin-top:1rem">
      <label>Logo</label>
      <div class="logo-row">
        <button class="logo-btn" onclick="document.getElementById('logo-input').click()">Choose image</button>
        <input type="file" id="logo-input" accept="image/*">
        <span class="logo-name" id="logo-name"></span>
        <button class="logo-clear" id="logo-clear" style="display:none" onclick="clearLogo()">remove</button>
      </div>
    </div>
    <div class="field" id="logo-size-field" style="display:none">
      <label>Logo Size — <span id="logo-size-val">30%</span></label>
      <input type="range" id="logo-size" min="10" max="60" value="30" style="width:100%;cursor:pointer">
    </div>

    <!-- Preview -->
    <div class="preview">
      <div id="qr-canvas"></div>
    </div>

    <!-- Download -->
    <div class="download-row">
      <button class="fmt-btn active" id="fmt-png" onclick="setFormat('png')">PNG</button>
      <button class="fmt-btn" id="fmt-svg" onclick="setFormat('svg')">SVG</button>
      <button class="download-btn" onclick="downloadQR()">Download</button>
    </div>
  </div>

  <script>
    let logoDataUrl = null;
    let activeTab = 'url';

    const qrCode = new QRCodeStyling({
      width: 300,
      height: 300,
      type: 'canvas',
      data: 'https://example.com',
      dotsOptions: { color: '#000000', type: 'extra-rounded' },
      cornersSquareOptions: { color: '#000000', type: 'extra-rounded' },
      cornersDotOptions: { color: '#000000' },
      backgroundOptions: { color: '#ffffff' },
      imageOptions: { crossOrigin: 'anonymous', margin: 8, imageSize: 0.3, hideBackgroundDots: true },
      qrOptions: { errorCorrectionLevel: 'H' },
    });

    qrCode.append(document.getElementById('qr-canvas'));

    function getData() {
      if (activeTab === 'url') {
        return document.getElementById('url-input').value.trim() || 'https://example.com';
      } else {
        const ssid = document.getElementById('wifi-ssid').value;
        const password = document.getElementById('wifi-password').value;
        const security = document.getElementById('wifi-security').value;
        return `WIFI:T:${security};S:${ssid};P:${password};;`;
      }
    }

    function update() {
      const fg = document.getElementById('fg-color').value;
      const bg = document.getElementById('bg-color').value;
      const dotType = document.getElementById('dot-style').value;
      const cornerType = document.getElementById('corner-style').value;

      const logoSize = parseInt(document.getElementById('logo-size').value) / 100;
      qrCode.update({
        data: getData(),
        image: logoDataUrl || undefined,
        imageOptions: { crossOrigin: 'anonymous', margin: 8, imageSize: logoSize, hideBackgroundDots: true },
        dotsOptions: { color: fg, type: dotType },
        cornersSquareOptions: { color: fg, type: cornerType },
        cornersDotOptions: { color: fg },
        backgroundOptions: { color: bg },
      });
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        document.getElementById('panel-' + activeTab).classList.add('active');
        update();
      });
    });

    // Color hex display
    document.getElementById('fg-color').addEventListener('input', e => {
      document.getElementById('fg-hex').textContent = e.target.value;
      update();
    });
    document.getElementById('bg-color').addEventListener('input', e => {
      document.getElementById('bg-hex').textContent = e.target.value;
      update();
    });

    // Logo upload
    document.getElementById('logo-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        logoDataUrl = ev.target.result;
        document.getElementById('logo-name').textContent = file.name;
        document.getElementById('logo-clear').style.display = 'inline';
        document.getElementById('logo-size-field').style.display = 'block';
        update();
      };
      reader.readAsDataURL(file);
    });

    function clearLogo() {
      logoDataUrl = null;
      document.getElementById('logo-input').value = '';
      document.getElementById('logo-name').textContent = '';
      document.getElementById('logo-clear').style.display = 'none';
      document.getElementById('logo-size-field').style.display = 'none';
      update();
    }

    document.getElementById('logo-size').addEventListener('input', e => {
      document.getElementById('logo-size-val').textContent = e.target.value + '%';
      update();
    });

    let downloadFormat = 'png';

    function setFormat(fmt) {
      downloadFormat = fmt;
      document.getElementById('fmt-png').classList.toggle('active', fmt === 'png');
      document.getElementById('fmt-svg').classList.toggle('active', fmt === 'svg');
    }

    function downloadQR() {
      qrCode.download({ name: 'qrcode', extension: downloadFormat });
    }

    // Live update on all inputs
    ['url-input','wifi-ssid','wifi-password'].forEach(id => {
      document.getElementById(id).addEventListener('input', update);
    });
    ['wifi-security','dot-style','corner-style'].forEach(id => {
      document.getElementById(id).addEventListener('change', update);
    });
  </script>
</body>
</html>
